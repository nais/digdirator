---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "digdirator.fullname" . }}-apiserver
  labels:
    {{- include "digdirator.labels" . | nindent 4 }}
spec:
  egress:
    - to:
      - ipBlock:
          cidr: 172.16.0.2/32
  podSelector:
    matchLabels:
      {{- include "digdirator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress